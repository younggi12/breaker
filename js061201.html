<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS 벽돌깨기 게임</title>
    <style>
    body{
        background-image: url("./iMG/game.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        /* opacity: 0.1; */
    }

    #gameBox{
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    canvas{
        width: 1000px;
        border: 5px solid darkcyan;
        border-radius: 5%;
        /* opacity: 0.85; */
        background: transparent;
    }

    #startBtn{
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        border-radius: 10px;
        border: 2px solid #999;
        font-weight: bold;
        font-size: 30px;
        background-color: darkcyan;
        color: white;
        cursor: pointer;
        display: none;
    }

    #restartBtn{
        position: absolute;
        left: 50%; top: 60%;
        transform: translate(-50%, -60%);
        padding: 10px 15px;
        border-radius: 10px;
        border: 2px solid deepskyblue;
        font-weight: bold;
        font-size: 20px;
        background-color: steelblue;
        color: white;
        cursor: pointer;
        display: none;
    }

    #gameTitle{
        position: absolute;
        top: 5%;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        font-size: 60px;
        text-shadow: 0 0 15px cyan;
        margin: 0;
    }
    </style>
</head>
<body>
    <div id="gameBox">
        <h1 id="gameTitle">🚀 SPACE BREAKER 🌌</h1>
        <canvas width="800" height="500"></canvas>
        <button id="startBtn">🛸 START MISSION !</button>
        <button id="restartBtn">🛸 TRY AGAIN</button>
    </div>
    <script>
        const canvas = document.querySelector("canvas")
        const startBtn = document.getElementById("startBtn")
        const restartBtn = document.getElementById("restartBtn")
        const ctx = canvas.getContext("2d")

        let bgImg = new Image()
        bgImg.src = "./iMG/game.jpg"
        
        bgImg.onload = function(){
        ctx.fillStyle = "white"
        ctx.font = "bold 30px sans-serif"
        ctx.textAlign = "center"
        ctx.shadowColor = "cyan"
        ctx.shadowBlur = 15
        ctx.shadowBlur = 0
        startBtn.style.display = "block"
        }

        // 공
        let ballX;
        let ballY;
        let ballR = 8;
        let ballSpeedX;
        let ballSpeedY;
        
        // 바
        let barX;
        let barY = canvas.height - 40 ;
        let barW = 120;
        let barH = 10;

        // 벽돌
        let bricks = []
        let bricksRow = 4
        let bricksCol = 9
        let bricksW = 60;
        let bricksH = 25;
        let bricksGap = 21;

        // 게임상태
        let gameOver;
        let aniId;

        let colors = [
            "rgba(0, 128, 0, 0.7)",      // darkgreen 흐리게
            "rgba(0, 0, 255, 0.7)",      // blue 흐리게
            "rgba(138, 43, 226, 0.7)",   // blueviolet 흐리게
            "rgba(0, 0, 139, 0.7)"       // darkblue 흐리게
        ]

        function startGame(){
            // 볼의 정보 
            ballX = canvas.width / 2
            ballY = barY - 30
            ballSpeedX = 4
            ballSpeedY = -4

            // 바의 정보
            barX = canvas.width/2 - barW/2

            // 벽돌 정보
            bricks = []
            for(let row = 0; row < bricksRow ; row++){
                for(let col = 0; col<bricksCol; col++){
                    bricks.push({
                        x : 55 + col * (bricksW + bricksGap),
                        y : 40 + row * (bricksH + bricksGap), 
                        show : true,
                        color : colors[ Math.floor(Math.random() * colors.length) ],
                        num : (row * bricksCol + col) + 1  
                    })
                }
            }

            //상태 정보
            gameOver = false
            restartBtn.style.display ="none";

            // 애니메이션 실행
            animate()
        }

        // 그리기
        function draw(){
           ctx.clearRect(0, 0, canvas.width, canvas.height)

            // 공
            ctx.beginPath()
            ctx.fillStyle = "white"
            ctx.shadowColor = "cyan"   // ← 추가 (글로우 색상)
            ctx.shadowBlur = 30        // ← 추가 (글로우 크기)
            ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
            ctx.fill()
            ctx.shadowBlur = 10

            //바
            ctx.beginPath()
            ctx.fillStyle = "white"
            ctx.roundRect(barX, barY, barW, barH, 10)
            ctx.fill()
            
            // 벽돌
            for(let i=0; i<bricks.length; i++){
                    if(bricks[i].show){
                        ctx.fillStyle = bricks[i].color
                        ctx.fillRect( bricks[i].x, bricks[i].y, bricksW, bricksH)
                    }
            }
            ctx.fillStyle = "white"
            ctx.font = "bold 20px sans-serif"
            ctx.textAlign = "center"
            ctx.shadowColor = "cyan"
            ctx.shadowBlur = 10
            ctx.shadowBlur = 0
        } 

        // 게임종료
        function endGame(){
            gameOver =true;
            cancelAnimationFrame(aniId)

            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"
            ctx.fillRect(0, 0, canvas.width, canvas.height)

            ctx.fillStyle = "orange"
            ctx.font = "bold 40px sans-serif"
            ctx.textAlign = "center"
            ctx.fillText("💀 MISSION FAILED  💀", canvas.width/2, canvas.height/2)

            restartBtn.style.display = "block"
        }

        restartBtn.addEventListener("click", function(){
            startGame()
        })

        startBtn.addEventListener("click", function(){
        startBtn.style.display = "none"
        startGame()
    })

        function move(){
            // 공 기본 좌표 변경(스피드)
            ballX += ballSpeedX
            ballY += ballSpeedY

            // 공이 왼쪽, 오른쪽 벽에 닿았을 때
            if(ballX + ballR > canvas.width || ballX - ballR < 0){
                ballSpeedX = ballSpeedX* -1
            }

            // 공이 위쪽벽에 닿았을 때 
            if(ballY - ballR < 0 ){
                 ballSpeedY = ballSpeedY * -1
            }

            // 공이 바에 닿았을때
            if( ballY + ballR > barY && 
                ballX > barX &&
                ballX < barW + barX
            ){
                ballSpeedY = ballSpeedY * -1
            }

            // 벽돌에 닿았을때
            for( let i = 0; i <bricks.length; i++){
                let b = bricks[i]
                if( b.show &&
                    ballX > b.x &&
                    ballX < b.x + bricksW &&
                    ballY + ballR > b.y &&
                    ballY - ballR < b.y + bricksH
                ){
                    b.show = false;
                    ballSpeedY = ballSpeedY * -1 
                }
            }

            // 공이 바닥으로 떨어지면 게임 종료
            if(ballY - ballR > canvas.height){
                endGame()
            }

            // 모든 벽돌 깨졌는지 체크
            let allClear = bricks.every(b => b.show === false)
            if(allClear){
                gameOver = true
                cancelAnimationFrame(aniId)

                ctx.fillStyle = "rgba(0, 0, 0, 0.6)"
                ctx.fillRect(0, 0, canvas.width, canvas.height)

                ctx.fillStyle = "cyan"
                ctx.font = "bold 40px sans-serif"
                ctx.textAlign = "center"
                ctx.fillText("🎉 MISSION CLEAR !!", canvas.width/2, canvas.height/2)

                restartBtn.style.display = "block"
            }
        }

        // 그리고 지우고 그리고 빨리 실행
        function animate(){
            if(gameOver) return

            draw()
            move()

           aniId = requestAnimationFrame(animate)
        }

        canvas.addEventListener("mousemove", function(e){
            let rect = canvas.getBoundingClientRect()
            // 정보제공
            // { x : x좌표값,
            //   y : y좌표값,
            //   w : 위드값,
            //   h : 하이값,
            //   top : top위치값,
            //   left : left위치값,
            //   ..
            // }
            let mouseX = e.clientX - rect.left
            barX = mouseX - barW/2

            if(barX < 0){
                barX = 0
            }

            if(barX + barW > canvas.width){
                barX = canvas.width-barW
            }

        })


        // startGame()
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">안녕하세요
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #dis{
            width: 100%;
            height: 100vh;
            background-color: pink;
        }

        ul{
            width: 500px;
            height: 500px;
            background-color: skyblue;
            color: black;
        }

        .libox{
            width: 300px;
            height: 300px;
            background-color: black;
        }
    </style>
</head>
<body>
    <!-- 
    1. 변수
    
    1-1 var :: 동일한 변수를 중복해서 선언이 가능함.

    1-2 let :: 이미 선언한 변수를 중복해서 선언할수없음. 

    1-3 const :: 변경하지 않을 데이터 선언, 이미 선언한 값에 대해 중복해서 값을 재 지정 할수없음.  

    2. 연산자

        2-1사칙연산자 ::+, -, *, /, %,
                    :: "문자1" + "문자2" ==> 문자연결 문자1 문자2
                    :: "문자1" + 20      ==> 에러발생 
                    :: 20 + 20          ==> 실제 더한 값 40

        2-2 증강연산자 :: ++, --,

        2-3 비교연산자 :: > 크다, >= 크거나 같다, < 작다, <= 작거나 같다, == 같다, != 같지않다

        2-4 논리연산자 :: &&(그리고, and), ㅣㅣ(또는, or)

        2-5 삼항연산자 :: 조건 ? 조건이 참일때 실행값 : 조건이 거짓일때

    3. 제어문 

        3-1 if :: if(조건){
                    조건이 참일때 실행값
                }esle{
                    조건이 거짓일때
                }

        3-2 switch :: switch(변수){
                        case 변수값의 경우 :
                        break
                        }

        3-3 do - while :: do{
                                반복할 실행문
                            }while(조건)

        3-4 for :: for(시작값 ; 종료값 ; 증가값){
                          반복할 실행문
                          }

        3-5  :: (배열과 전개연산자(...))       
        
        
    4. js에서 html 요소 만들기
        createElement

    -->
        <div id="dis"></div>

    <script>
        let ulbox = document.createElement("ul")
        let libox = document.createElement("li")
        libox.innerHTML = "안녕하세요"
        libox.classList.add =("libox")
        ulbox.appendChild(libox) 
        dis.appendChild(ulbox)

        // let dis = document.querySelector("#dis")
        // let html=''
        // html = `<ul>
        //          <li class="libox">안녕하세요</li>   
        //         </ul>`
        // dis.innerHTML = html 

        var num1 = 10
        var num1 = 30

        let num2 = 20 
            num2 = 30 // let으로 다시 선언하면 에러발생

        const num3 = 20
            // num3 = 30 // const는 값도 재 지정 할수없음.

        
        document.write( num2++ )  // 값을 출력하고 1증가
        document.write( ++num2 )  // 1증가 부터 먼저하고 출력

        let num4 = 10
        let num5 = '10'
        document.write(` num4이 num5보다 큽니까? ${num4 > num5}` )
        document.write(` num4이 num5보다 크거나 같습니까? ${num4 >= num5}` )
        document.write(` num4이 num5보다 같습니까? ${num4 == num5}` )
        document.write(` num4이 num5보다 같습니까? ${num4 === num5}` )
        document.write(` num4이 num5보다 같지 않습니까? ${num4 !== num5}` )


        document.write(` num4가 10보다 크고 num5가 20보다 큽니까?${num4 > 10 && num5 > 20}` )
        document.write(` num4가 10보다 크거나 같고 또는 num5가 20보다 큽니까?${num4 > 10 ||  num5 > 20}` )


        document.write(`num4가 10보다 크면 "크다" 그렇지 않으면 "작거나 같다"? ${num4 > 10 ? "크다" : "작거나 같다"}`);


        let avg = 90
        switch (avg){
            case 100 : 
            document.write("우수합니다")
            break;

            case 90 :
            document.write("적당합니다")
            break; 

            case 80 :
            document.write("보통입니다")
            break; 

            default : 
            document.write("해당없음")
            break; 
        }


        let num = 0
        do{
            num++
        }while(num < 10)
        document.write("num은 얼마? : ", num)


        let name = ["a", "b", "c"]
        for(let i = 0; i < name.length; i++){
            document.write(` ${i} : ${name[i]} `)
        }

        let name2 = name      // 절대 안됨! 새로운 값이 아니라 이름만 틀리게 함
        let name3 = [...name] // name을 복사
        name[1] = "k"
        document.write( name[1]  ) // k 출력 
        document.write( name2[1] ) // k 출력 
        document.write( name3[1] ) // 원래 값 'b' 출력

    </script>
</body>
</html>

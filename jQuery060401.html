<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery</title>
    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous">
    </script>
</head>
<body>
    <!-- 
        장점 : js 쉽고 짧다. 애니메이션이 조금 부드럽다
               다양한 플러그인 지원

        jQuery : 아코디언 메뉴, 스크롤 헤더 변경, 이미지슬라이드
        이미지 페이드인/아웃, 모달 팝업 (오늘 하루 안보기), 호버 서버메뉴,
        필터 메뉴를 학습 
        플러그인 사용

        1. 기본구조
        $(document).ready(function(){
            모든 dom 요소가 로딩이 되면 
        })

        2. 축약버전 
        $(function(){

        })
    -->

        <button id="btn">클릭</button>
        <p id="dis">원래 문구</p>

    <script>
        $(function(){
            $("#btn").click(function(){
                $("#dis").text("버튼을 클릭했습니다.")
                // .text() :: 값 읽기 기능,
                // .text("값을 넣었다") :: 값 부여 기능     
            })
        })
    </script>
</body>
</html>

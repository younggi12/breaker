<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

canvas{
    display:block;
}
</style>

</head>
<body>

<canvas></canvas>

<script>

const canvas = document.querySelector("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 배경 이미지
const bgImg = new Image();
bgImg.src = "./img/bu.jpg";

// 버블 배열
const circles = [];

for(let i = 0; i < 30; i++){
    circles.push({
        x : Math.random() * canvas.width,
        y : Math.random() * canvas.height,
        r : 40 + Math.random() * 50,
        speedX : (Math.random() - 0.5) * 3,
        speedY : (Math.random() - 0.5) * 3,
        color : `hsla(${Math.random()*360},100%,80%,0.2)`,
        border : `hsla(${Math.random()*360},100%,80%,0.9)`,
        pulse : Math.random() * Math.PI * 2
    });
}

function ani(){

    // 배경 이미지
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
        bgImg,
        0,
        0,
        canvas.width,
        canvas.height
    );

    // 배경 어둡게
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i = 0; i < circles.length; i++){

        let circle = circles[i];

        circle.x += circle.speedX;
        circle.y += circle.speedY;

        // 좌우 흔들림
        circle.x += Math.sin(Date.now()*0.001 + i) * 0.1;

        // 크기 변화
        circle.pulse += 0.03;
        let drawR = circle.r + Math.sin(circle.pulse) * 2;

        // 벽 충돌
        if(circle.x + drawR > canvas.width || circle.x - drawR < 0){
            circle.speedX *= -1;
        }

        if(circle.y + drawR > canvas.height || circle.y - drawR < 0){
            circle.speedY *= -1;
        }

        // 그림자
        ctx.shadowBlur = 20;
        ctx.shadowColor = circle.border;

        // 그라데이션
        let gradient = ctx.createRadialGradient(
            circle.x - drawR/4,
            circle.y - drawR/4,
            1,
            circle.x,
            circle.y,
            drawR
        );

        gradient.addColorStop(0,"rgba(255,255,255,0.5)");
        gradient.addColorStop(0.6,circle.color);
        gradient.addColorStop(1,"rgba(255,255,255,0.05)");

        // 원
        ctx.beginPath();
        ctx.arc(circle.x, circle.y, drawR, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // 테두리
        ctx.strokeStyle = circle.border;
        ctx.lineWidth = 2;
        ctx.stroke();

        // 반사광 1
        ctx.beginPath();
        ctx.arc(
            circle.x - drawR/5,
            circle.y - drawR/5,
            drawR/10,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fill();

        // 반사광 2
        ctx.beginPath();
        ctx.arc(
            circle.x + drawR/5,
            circle.y + drawR/5,
            drawR/60,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();
    }

    requestAnimationFrame(ani);
}

// 이미지 로드 후 시작
bgImg.onload = function(){
    ani();
};

// 창 크기 변경
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>

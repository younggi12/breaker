<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)젠스타메이트</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./reset.css">
<style>

header {
    height: 70px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    border-bottom: 1px solid #eee;
    position: relative;
}
.logo {
    font-size: 20px;
    font-weight: 800;
}
.nav {
    display: flex;
    gap: 40px;
    margin-left: auto;
}
.nav a {
    font-size: 14px;
    color: #444;
}
.nav a.active {
    color: #1a2a5e;
    font-weight: 600;
}
.hambtn {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 36px;
    height: 28px;
    margin-left: auto;
    border: none;
    cursor: pointer;
}
.hambtn span {
    display: block;
    width: 100%;
    height: 3px;
    background-color: black;
    border-radius: 2px;
}

/* 메뉴 */
.menu {
    display: none;
    position: fixed;
    inset: 0;
    background-color: #fff;
    z-index: 999;
    flex-direction: column;
    padding: 24px;
}
.menu.on {
    display: flex;
}
.menu-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 32px;
}
.menu-login-btn {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
}
.menu-close {
    font-size: 28px;
    color: #888;
    cursor: pointer;
}
.menu-links a {
    display: block;
    font-size: 20px;
    font-weight: 600;
    padding: 16px 12px;
    border-radius: 12px;
}
.menu-links a.active {
    background: #f2f3f5;
}

/* 로고 */
.pro {
    width: 100%;
    height: 220px;
    background: #e8e8e8;
    display: flex;
    align-items: flex-end;
    padding: 0 40px 40px;
}
.pro h1 {
    font-size: 32px;
    font-weight: 800;
}

/* ******** */
.content {
    margin: 0 auto;
    padding: 60px 40px 80px;
}
.note {
    margin-top: 40px;
    border-top: 1px solid #ddd;
    padding-top: 20px;
}
.note p {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
}
.note li {
    font-size: 13px;
    color: #555;
    line-height: 1.7;
    margin-left: 20px;
}

@media (max-width: 768px) {
    .hambtn {
        display: flex;
    }
    .nav {
        display: none;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">GenstarMate</div>
    <button class="hambtn">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="nav">
        <a href="#">회사소개</a>
        <a href="#">채용 공고</a>
        <a href="#" class="active">채용 프로세스</a>
        <a href="#">자주 묻는 질문</a>
        <a href="#">공식 홈페이지</a>
        <a href="#">로그인</a>
    </nav>
</header>

<div class="menu" id="menu">
    <div class="menu-top">
        <button class="menu-login-btn">로그인</button>
        <button class="menu-close">✕</button>
    </div>
    <div class="menu-links">
        <a href="#">회사 소개</a>
        <a href="#">채용 공고</a>
        <a href="#" class="active">채용 프로세스</a>
        <a href="#">자주 묻는 질문</a>
        <a href="#">공식 홈페이지</a>
    </div>
</div>

<div class="pro"><h1>채용 프로세스</h1></div>

<div class="content">
    <div class="note">
        <p>주의사항</p>
        <ul>
            <li>서류전형 또는 면접전형 과정 간 경력 및 평판 조회(Reference Check)가 실시 될 수 있습니다.</li>
            <li>상기 채용 절차는 직무 및 상황에 따라 변경될 수 있습니다.</li>
        </ul>
    </div>
</div>

<script>
$(function(){
    $(".hambtn, .menu-close").on("click", function() {
    $(".menu").toggleClass("on");
});
});
</script>
</body>
</html>

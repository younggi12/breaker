<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텝 버튼</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .wrap{
            width: 800px;
            margin: 50px auto;
        }

        .menu{
            display: flex;
        }

        .menu button{
            height: 50px;
            border: none;
            background-color: #ccc;
            cursor: pointer;
            font-size: 20px;
            padding: 5px 10px;
            flex: 1;
        }

        .menu button.on{
            background-color: #222;
            color: white;
        }

        .content{
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            font-size: 25px;
        }

        .content.on{
            display: block;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="menu">
            <button class="on">공지사항</button>
            <button>갤러리</button>
            <button>Q&A</button>
            <button>오시는길</button>
        </div>

        <div class="content on">
            공지사항 내용입니다.
        </div>

        <div class="content">
            갤러리 내용입니다.
        </div>

        <div class="content">
            Q&A 내용입니다.
        </div>

        <div class="content">
            오시는길.
        </div>
    </div>

    <script>
        $(".menu button").on("click", function(){
            let idx = $(this).index()
            $(".menu button").removeClass("on")
            $(this).addClass("on")

            $(".content").removeClass("on")
            $(".content").eq(idx).addClass("on")
        })
    </script>

    
</body>
</html>

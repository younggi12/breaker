<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬스토리지를 활용한 팝업창</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        *{
            margin: 0; padding: 0; box-sizing: border-box;
            text-decoration: none; list-style: none;
        }
        .modalBg{
            position: fixed;
            left :0px;
            top:0px;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            
        }

        .modal{
            width: 350px;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal .wrap{
            padding: 20px;
            text-align: center;
        }
        .wrap h2{
            margin-bottom: 20px;
        }
        .wrap p{
            line-height: 1.6;
        }

        .btn{
            display: flex;
            border-top: 1px solid #ccc;
        }

        .btn button{
            width: 50%;
            height: 30px;
            padding: 5px 10px;
            border: none;
            background-color: #ccc;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <h1>여기는 메인 페이지 입니다</h1>

    <div class="modalBg">
        <div class="modal">
            <div class="wrap">
                <h2>공지사항</h2>
                <p>
                    오늘의 이벤트 안내<br>
                    다양한 혜택이 있습니다
                </p>
            </div>
            <div class="btn">
                <button class="todayClose">오늘 그만보기</button>
                <button class="close">닫기</button>
            </div>
        </div>
    </div>

    <script>
        $(function(){
            let today = new Date().toDateString()
            let saveday = localStorage.getItem("closeday")

            if( saveday !== today ){
                $(".modalBg").css("display", "flex")
            }
            $(".todayClose").click(function(){
                localStorage.setItem("closeday", today)
                $(".modalBg").hide()
            })

            $(".close").click(function(){
                 $(".modalBg").hide()
            })

        })
    </script>
</body>
</html>

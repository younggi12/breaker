<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css" />
    <style>
        body{
            background-color: none;
            width: 100vw;
            overflow-x: hidden;

        }
        .nav{
            position:fixed;
            left:0;
            top:0;
            width:100%;
            height:70px;
            z-index:100;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:0 clamp(1rem, 4vw, 5rem);
            background:rgba(0,0,0,0.25);
        }

        .logo{
            color:white;
            font-size:clamp(1.25rem, 2vw, 1.5rem);
            font-weight:bold;
        }

        .menu{           
            display:flex;
            gap:30px;
            justify-content: center;
            align-items: center;
            padding:0 clamp(1rem, 4vw, 5rem);
        }

        .menu a{
            color:white;
            font-weight: bold;
            text-decoration:none;
            font-size:clamp(0.875rem, 1.2vw, 2rem);
        }

        /* 햄버거 */
        .hamburger{
            display:none;
            border:none;
            background:none;
            color:white;
            font-size:35px;
            cursor:pointer;
        }

        /* 슬라이드 */
        .wrap{
            width:100%;
            height:100vh;
            overflow:hidden;
            position:relative;
        }

        .slider{
            display:flex;
            width:400%;
            height:100%;
            transition:transform 1s ease-in-out;
        }

        .slide{
            width:100vw;
            height:100vh;
            flex-shrink:0;
            position:relative;
        }

        .slide video{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        /* 슬라이드의 에프터 넣을자리 */


        /* 타이틀 */
        .textBox{
            position:absolute;
            left:8%;
            bottom:22%;
            z-index:10;
            color:white;
        }

        .textBox h2{
            font-size:clamp(36px, 6vw, 90px);
            margin-bottom:20px;
            opacity:0;
            transform:translateY(60px);
        }

        .textBox p{
            font-size:clamp(16px, 2vw, 28px);
            opacity:0;
            transform:translateY(60px);
        }

        .slide.on h2{
            animation:titleUp 0.9s forwards;
        }

        .slide.on p{
            animation:titleUp 0.9s 0.25s forwards;
        }

        @keyframes titleUp{
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>
<body>
    <nav class="nav">
            <div class="logo">
                VIDEO
            </div>
            <button class="hamburger">
                ☰
            </button>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
    </nav>

    <div class="wrap">
        <div class="slider">
                <!-- 1 -->
                <div class="slide">
                    <video autoplay muted loop playsinline>
                        <source src="./mp4/car2.mp4" type="video/mp4">
                    </video>

                    <div class="textBox">
                        <h2>First Video</h2>
                        <p>첫 번째 동영상 타이틀입니다</p>
                    </div>
                </div>

                <!-- 2 -->
                <div class="slide">
                    <video autoplay muted loop playsinline>
                        <source src="./mp4/car3.mp4" type="video/mp4">
                    </video>

                    <div class="textBox">
                        <h2>Second Scene</h2>
                        <p>두 번째 동영상 설명입니다</p>
                    </div>
                </div>

                <!-- 3 -->
                <div class="slide">
                    <video autoplay muted loop playsinline>
                        <source src="./mp4/car4.mp4" type="video/mp4">
                    </video>

                    <div class="textBox">
                        <h2>Third Motion</h2>
                        <p>세 번째 동영상 문구입니다</p>
                    </div>
                </div>
                <!-- 복제 1 -->
                <div class="slide">
                    <video autoplay muted loop playsinline>
                        <source src="../mp4/car2.mp4" type="video/mp4">
                    </video>

                    <div class="textBox">
                        <h2>First Video</h2>
                        <p>첫 번째 동영상 타이틀입니다</p>
                    </div>
                </div>
        </div> <!-- slider end -->
        <!-- 좌우 버튼 구현 할것 -->
    </div> <!-- wrap end -->

    <script>
        const slider = document.querySelector(".slider")
        const slides = document.querySelectorAll(".slide")
        const hamburger = document.querySelector(".hamburger")
        const menu = document.querySelector(".menu")

        let index = 0

        function showTitle(){

            slides.forEach(function(slide){
                slide.classList.remove("on")
            })

            void slides[index].offsetHeight;
            slides[index].classList.add("on")
        }
        showTitle()
    </script>
</body>
</html>

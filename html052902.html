<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        .wrap{
            width: 100%;
            height: 100vw;
            overflow: hidden;
        }

        .wrap video{
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            left: 0; top: 0;
            /* display: none; */
            opacity: 0;
            transition: all 1s;
        }

        .wrap video.on{
            /* display: block; */
            opacity: 1;
        }


    </style>
</head>
<body>
    <div class="wrap">
        <!-- 
        autoplay : 자동재생
        muted : 음소거
        loop : 무한 반복
        playsinline : 모바일
        -->
        <video  muted playsinline>
            <source src="./mp4/a1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        let video = document.querySelectorAll("video")
        let index = 0

        video[index].classList.add("on")
        video[index].play()

        setInterval(function(){
                video[index].pause()
                video[index].classList.remove("on")

                index++

                // 마지막이 넘으면 처음으로
                if(index >= video.length){
                    index = 0
                }

                // 현재 영상 플레이 위치를 처음으로 설정
                video[index].currentTime = 0
                video[index].classList.add("on")
                video[index].play()
        },5000)
    </script>
</body>
</html>
